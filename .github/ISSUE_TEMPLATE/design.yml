name: "🎨 Design (디자인 변경)"
description: "CSS 등 사용자 UI/UX 디자인을 변경할 때 사용합니다."
title: "🎨 Design: "
labels: ["🎨 Design (디자인 변경)"]
type: Feature
body:
  - type: textarea
    id: overview
    attributes:
      label: "🛠️ Issue Overview"
      placeholder: "예: 로그인 버튼 색상 변경"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Issue Description"
      placeholder: "예: 기존 파란색 버튼을 브랜드 컬러인 네이비로 변경합니다."
  - type: textarea
    id: todo
    attributes:
      label: "✅ To do"
      placeholder: "예: - [ ] login.css 수정"