# [Project Information]
spring:
  application:
    name: ${APP_NAME:WaveyService}

  # [Social Login Configuration]
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            #apple:
            #client-id: ${APPLE_CLIENT_ID}

  # [Database Configuration]
  datasource:
    # --- 방법 A: H2 Database (임시 신기능 테스트용) ---
    url: ${H2_URL:jdbc:h2:mem:testdb}
    username: ${H2_USERNAME:sa}
    password: ${H2_PASSWORD:}
    driver-class-name: org.h2.Driver

    # --- 방법 B: PostgreSQL (로컬 관리용 - 사용 시 위 H2 설정을 주석 처리하세요) ---
    # url: ${PG_URL:jdbc:postgresql://localhost:5432/wavey_db}
    # username: ${PG_USERNAME:postgres}
    # password: ${PG_PASSWORD:password}
    # driver-class-name: org.postgresql.Driver

  # [H2 Console Settings]
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # [JPA & Hibernate Settings]
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # [JSON Serialization Setup]
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

# --- [수정 포인트] spring 계층 밖(맨 왼쪽)으로 이동하여 Placeholder 에러 해결 ---
auth:
  server-url: ${SERVER_URL:http://localhost:8080}
  base-url: ${AUTH_BASE_URL:/oauth2/authorization/}
  google-path: ${GOOGLE_AUTH_PATH:google}
  apple-path: ${APPLE_AUTH_PATH:apple}
  admin-white-list: ${ADMIN_EMAILS}

jwt:
  secret: ${key}
  access-token-expiration: ${a_exp}
  refresh-token-expiration: ${r_exp}

# [Logging Configuration]
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# [Swagger / OpenAPI Documentation]
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json